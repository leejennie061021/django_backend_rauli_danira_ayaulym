{% extends 'indexer/base.html' %}

{% block content %}
<div class="auth-container fade-in">
    <h2 class="auth-title">Восстановление пароля</h2>
    <p style="color: #666; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5;">
        Забыли пароль? Введите свой email, и мы отправим вам ссылку для создания нового.
    </p>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            {{ form.email }}
        </div>
        
        <button type="submit" class="btn-submit">Отправить ссылку</button>
    </form>
    
    <div class="auth-links" style="margin-top: 25px;">
        <a href="{% url 'login' %}" class="btn-back">← Назад ко входу</a>
    </div>
</div>

<style>
    /* Небольшой фикс, чтобы инпут email растянулся на всю ширину */
    .auth-form input[type="email"] {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1rem;
        outline: none;
        transition: all 0.3s;
    }
    .auth-form input[type="email"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    [data-theme="dark"] .auth-form input[type="email"] {
        background: #334155;
        border-color: #475569;
        color: #f8fafc;
    }
</style>
{% endblock %}
