{% extends 'indexer/base.html' %}

{% block content %}
<div class="auth-container fade-in">
    <h2 class="auth-title">Кіру / Вход</h2>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div style="text-align: right; margin-bottom: 20px; margin-top: -10px;">
            <a href="{% url 'password_reset' %}" style="color: var(--accent); font-size: 0.9rem; text-decoration: none; font-weight: 500;">Забыли пароль?</a>
        </div>
        
        <button type="submit" class="btn-submit">Войти</button>
    </form>
    
    <div class="auth-links" style="margin-top: 20px;">
        <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a></p>
    </div>
</div>
{% endblock %}
