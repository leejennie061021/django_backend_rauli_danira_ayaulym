{% extends 'indexer/base.html' %}

{% block content %}
<div class="auth-container fade-in">
    <h2 class="auth-title">Письмо отправлено! ✉️</h2>
    <p style="color: #666; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.6;">
        Мы отправили инструкцию по сбросу пароля на указанный email. <br><br>
        Пожалуйста, проверьте почту. Если письма нет во входящих, загляните в папку <b>«Спам»</b>.
    </p>
    
    <div class="auth-links" style="margin-top: 25px;">
        <a href="{% url 'login' %}" class="btn-back">← Вернуться ко входу</a>
    </div>
</div>
{% endblock %}
